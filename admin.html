<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>لوحة الإدارة</title>
  <link rel="stylesheet" href="./assets/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div class="admin-wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>لوحة إدارة المنتجات</h1>
          <small>Supabase Ready</small>
        </div>
      </div>
      <div class="small-actions">
        <button class="btn" id="logoutBtn" type="button">تسجيل خروج</button>
      </div>
    </div>

    <section class="panel" id="dashboard" style="display:none;">
      <div class="panel-head">
        <div style="font-weight:900;">المنتجات</div>
        <div class="actions">
          <button class="btn" id="seedBtn" type="button">رفع بيانات products.json</button>
          <button class="btn" id="refreshBtn" type="button">تحديث</button>
          <button class="btn primary" id="addBtn" type="button">إضافة منتج</button>
        </div>
      </div>

      <div style="padding:12px 12px 0; display:none;" id="configWarn"></div>

      <div style="overflow:auto;">
        <table class="table">
          <thead>
            <tr>
              <th style="width:28%">المنتج</th>
              <th>الرابط + QR</th>
              <th style="width:16%">إجراءات</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <!-- Login Modal -->
  <div class="modal open" id="loginModal" role="dialog" aria-modal="true">
    <div class="modal-card login-card">
      <div class="modal-head">
        <h2>تسجيل الدخول</h2>
      </div>
      <div class="modal-body">
        <div class="err" id="loginError"></div>
        <div class="field">
          <label for="username">اسم المستخدم</label>
          <input id="username" type="text" autocomplete="username" />
        </div>
        <div class="field" style="margin-top:10px;">
          <label for="password">كلمة المرور</label>
          <input id="password" type="password" autocomplete="current-password" />
        </div>
        <button class="btn primary" id="loginBtn" type="button">دخول</button>
      </div>
    </div>
  </div>

  <!-- Product Form Modal -->
  <div class="modal" id="formModal" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="formTitle">إضافة منتج</h2>
        <button class="btn" id="closeForm" type="button">إغلاق</button>
      </div>
      <div class="modal-body">
        <div class="err" id="formError"></div>
        <input type="hidden" id="productId" />

        <div class="grid2">
          <div class="field">
            <label for="name">اسم المنتج</label>
            <input id="name" type="text" />
          </div>
          <div class="field">
            <label for="price">السعر</label>
            <input id="price" type="number" step="0.001" />
          </div>
        </div>

        <div style="height:12px"></div>

        <div class="switch" id="discountWrap">
          <div class="meta">
            <b>تفعيل الخصم</b>
            <span>الخصم المنتهي يتم إخفاؤه تلقائياً</span>
          </div>
          <input id="discountEnabled" type="checkbox" />
        </div>

        <div style="height:12px"></div>

        <div class="grid2">
          <div class="field">
            <label for="discountPrice">سعر الخصم</label>
            <input id="discountPrice" type="number" step="0.001" />
          </div>
          <div class="field">
            <label for="discountEnd">تاريخ انتهاء الخصم</label>
            <input id="discountEnd" type="date" />
          </div>
        </div>

        <div style="height:12px"></div>

        <div class="field">
          <label for="description">وصف المنتج</label>
          <textarea id="description"></textarea>
        </div>

        <div style="height:12px"></div>

        <div class="grid2">
          <div class="field">
            <label for="image">رابط الصورة</label>
            <input id="image" type="url" />
          </div>
          <div class="field">
            <label>فيديو إنستجرام</label>
            <div class="switch" style="margin-bottom:10px;">
              <div class="meta">
                <b>تفعيل الفيديو</b>
                <span>إيقافه يخفي الزر في صفحة المنتج</span>
              </div>
              <input id="igEnabled" type="checkbox" checked />
            </div>
            <label for="igUrl">رابط إنستجرام</label>
            <input id="igUrl" type="url" />
          </div>
        </div>

        <div style="display:flex; gap:10px; margin-top:16px; flex-wrap:wrap;">
          <button class="btn primary" id="saveBtn" type="button">حفظ</button>
          <button class="btn" id="cancelBtn" type="button">إلغاء</button>
        </div>
      </div>
    </div>
  </div>

  <script src="./assets/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./assets/admin.js"></script>
</body>
</html>
